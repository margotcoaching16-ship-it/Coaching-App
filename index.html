    await supa('PATCH','bilans_hebdo',payload,`?id=eq.${bilan._supaId}`);
  } else {
    const existing=await supa('GET','bilans_hebdo','',`?client_id=eq.${bilan.client_id}&semaine_debut=eq.${bilan.date}`);
    if(existing&&existing.length){
      await supa('PATCH','bilans_hebdo',payload,`?id=eq.${existing[0].id}`);
      bilan._supaId=existing[0].id;
    } else {
      const res=await supa('POST','bilans_hebdo',payload);
      if(res&&res[0]) bilan._supaId=res[0].id;
    }
  }
}

async function saveCustomAlimentToSupa(aliment){
  const existing=await supa('GET','aliments_custom','',`?id=eq.${aliment.id}`);
  if(!existing||!existing.length){
    const payload={
      id:aliment.id,
      categorie:aliment.categorie||'Divers',
      nom:aliment.nom,
      kcal:aliment.kcal||0,
      proteines:aliment.proteines||0,
      glucides:aliment.glucides||0,
      lipides:aliment.lipides||0,
      poids_unite:aliment.poids_unite||null,
      client_id:aliment.client_id||S.client?.id||null
    };
    await supa('POST','aliments_custom',payload);
  }
}

async function saveRecetteToSupa(recette){
  const existing=await supa('GET','recettes','',`?id=eq.${recette.id}`);
  if(existing&&existing.length){
    await supa('PATCH','recettes',{nom:recette.nom,categorie:recette.categorie,nb_parts:recette.nb_parts,ingredients:recette.ingredients},`?id=eq.${recette.id}`);
  } else {
    await supa('POST','recettes',recette);
  }
}

async function saveExoCustomToSupa(exo){
  const existing=await supa('GET','exercices','',`?id=eq.${exo.id}`);
  if(!existing||!existing.length){
    await supa('POST','exercices',{id:exo.id,nom:exo.nom,cat:exo.cat,desc_exercice:exo.desc||'',video:exo.video||'',is_custom:true});
  }
}

async function deleteClientFromSupa(id){
  await supa('DELETE','clients','',`?id=eq.${id}`);
}

async function _deleteExo(id){
  if(!confirm('Supprimer cet exercice ?')) return;
  S.exercices=S.exercices.filter(e=>e.id!==id);
  lsSet('c_exercices',S.exercices);
  persist();
  await supa('DELETE','exercices','',`?id=eq.${id}`);
  closeModal();
  navigate('exercices');
  toast('Exercice supprimé');
}

function showClientOptionsModal(clientId){
  const c=S.clients.find(x=>x.id===clientId)||S.archivedClients?.find(x=>x.id===clientId);
  if(!c)return;
  const isArchived=c.archive===true;
  openModal(`
    <div class="modal-title">${c.prenom} ${c.nom}</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">
      ${!isArchived?`<button class="btn btn-secondary" onclick="archiveClient('${clientId}')">📦 Archiver ce client</button>`:''}
      ${isArchived?`<button class="btn btn-secondary" onclick="restoreClient('${clientId}')">♻️ Restaurer ce client</button>`:''}
      <button class="btn" style="background:rgba(220,50,50,0.12);color:#e05555;border:1px solid rgba(220,50,50,0.25)" onclick="confirmDeleteClient('${clientId}')">🗑️ Supprimer définitivement</button>
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
    </div>
  `);
}

async function archiveClient(id){
  const c=S.clients.find(x=>x.id===id);if(!c)return;
  c.archive=true;
  S.clients=S.clients.filter(x=>x.id!==id);
  if(!S.archivedClients)S.archivedClients=[];
  S.archivedClients.push(c);
  lsSet('c_clients',S.clients);
  lsSet('c_archivedClients',S.archivedClients);
  await supa('PATCH','clients',{archive:true},`?id=eq.${id}`);
  closeModal();render.clients();toast('📦 Client archivé');
}

async function restoreClient(id){
  if(!S.archivedClients)return;
  const c=S.archivedClients.find(x=>x.id===id);if(!c)return;
  c.archive=false;
  S.archivedClients=S.archivedClients.filter(x=>x.id!==id);
  S.clients.push(c);
  lsSet('c_clients',S.clients);
  lsSet('c_archivedClients',S.archivedClients);
  await supa('PATCH','clients',{archive:false},`?id=eq.${id}`);
  closeModal();render.archives();toast('♻️ Client restauré');
}

function confirmDeleteClient(id){
  const c=S.clients.find(x=>x.id===id)||S.archivedClients?.find(x=>x.id===id);if(!c)return;
  openModal(`
    <div class="modal-title">Supprimer ${c.prenom} ${c.nom} ?</div>
    <div style="color:var(--text2);font-size:14px;margin-bottom:16px">Cette action est irréversible. Toutes les données du client seront perdues.</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn" style="background:rgba(220,50,50,0.15);color:#e05555;border:1px solid rgba(220,50,50,0.3)" onclick="deleteClient('${id}')">Confirmer la suppression</button>
      <button class="btn btn-secondary" onclick="closeModal()">Annuler</button>
    </div>
  `);
}

async function deleteClient(id){
  S.clients=S.clients.filter(x=>x.id!==id);
  if(S.archivedClients)S.archivedClients=S.archivedClients.filter(x=>x.id!==id);
  lsSet('c_clients',S.clients);
  lsSet('c_archivedClients',S.archivedClients);
  await deleteClientFromSupa(id);
  closeModal();
  if(S.screen==='archives')render.archives();
  else render.clients();
  toast('🗑️ Client supprimé');
}

render.archives=function(){
  setTopbar('Archives','',`<div class="icon-btn" onclick="logout()" title="Déconnexion"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>`);
  const list=S.archivedClients||[];
  const el=document.getElementById('archives-list');
  if(!el)return;
  if(!list.length){
    el.innerHTML=`<div class="empty" style="padding:60px 24px"><div class="empty-icon">🗂️</div><div class="empty-title">Aucun client archivé</div><div class="empty-sub">Les clients archivés apparaîtront ici</div></div>`;
    return;
  }
  el.innerHTML=`<div class="section-label" style="padding:12px 16px 8px">Clients archivés</div>`+
    list.map((c,i)=>{
      const [bg,text]=avatarColors(i);
      return `<div class="client-row" style="opacity:0.75">
        <div class="avatar" style="background:${bg};color:${text}">${initials(c)}</div>
        <div class="client-info">
          <div class="client-name">${c.prenom} ${c.nom}</div>
          ${c.email?`<div class="client-obj">${c.email}</div>`:''}
        </div>
        <div class="client-actions">
          <button class="icon-btn" onclick="showClientOptionsModal('${c.id}')" style="width:28px;height:28px;font-size:14px">⋯</button>
        </div>
      </div>`;
    }).join('');
};

function startFreshCheckin(){
  const today=new Date().toISOString().slice(0,10);
  S.checkinData={_loaded:false,date:today};
  navigate('checkin');
}

function copyClientLink(clientId){
  const base=window.location.origin+window.location.pathname;
  const link=base+'?client='+clientId;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(link).then(()=>{
      toast('🔗 Lien copié !');
    }).catch(()=>showLinkModal(link));
  } else {
    showLinkModal(link);
  }
}

function showLinkModal(link){
  openModal(
    '<div class="modal-title">Lien du profil client</div>'+
    '<div style="font-size:12px;color:var(--text2);margin-bottom:12px">Envoie ce lien à ton client :</div>'+
    '<div style="background:var(--bg2);border-radius:var(--radius);padding:10px 12px;font-size:11px;word-break:break-all;color:var(--text);user-select:all">'+link+'</div>'+
    '<button class="btn btn-primary" style="margin-top:12px" onclick="closeModal()">Fermer</button>'
  );
}

function showNewExoModal(){showExoForm(null);}
function showEditExoModal(id){
  const exo=S.exercices.find(e=>e.id===id);
  if(exo)showExoForm(exo);
}

function showExoForm(exo){
  const cats=['Jambes','Fessiers','Pectoraux','Dos','Épaules','Biceps','Triceps','Abdominaux','Full body','Cardio','Autre'];
  const catOptions=cats.map(c=>'<option value="'+c+'"'+(exo&&exo.cat===c?' selected':'')+'>'+c+'</option>').join('');
  const title=exo?'Modifier':'Créer un exercice';
  const deleteBtn=exo&&exo.id.startsWith('c')?'<button class="btn btn-danger" style="margin-top:8px" onclick="_deleteExo(\''+exo.id+'\')">Supprimer</button>':'';
  openModal(
    '<div class="modal-title">'+title+'</div>'+
    '<div class="form-group"><label class="form-label">Nom</label><input class="form-inp" id="ef-nom" value="'+(exo?exo.nom:'')+'" placeholder="ex : Squat barre" /></div>'+
    '<div class="form-group"><label class="form-label">Catégorie</label><select class="form-inp form-inp-sm form-select" id="ef-cat">'+catOptions+'</select></div>'+
    '<div class="form-group"><label class="form-label">Description (optionnel)</label><textarea class="form-inp form-inp-sm" id="ef-desc" rows="2" placeholder="Technique, points clés...">'+( exo&&exo.desc?exo.desc:'')+'</textarea></div>'+
    '<div class="form-group"><label class="form-label">Lien vidéo YouTube (optionnel)</label><input class="form-inp form-inp-sm" id="ef-video" value="'+(exo&&exo.video?exo.video:'')+'" placeholder="https://youtube.com/..." /></div>'+
    '<button class="btn btn-primary" onclick="'+(exo?'saveExo(\''+exo.id+'\')':'createExo()')+'">Enregistrer</button>'+
    deleteBtn
  );
  setTimeout(()=>document.getElementById('ef-nom')?.focus(),300);
}

function createExo(){
  const nom=document.getElementById('ef-nom').value.trim();
  if(!nom){toast('⚠ Saisis un nom');return;}
  const newExo={
    id:'c'+uid(),
    nom,
    cat:document.getElementById('ef-cat').value,
    desc:document.getElementById('ef-desc').value.trim()||'',
    video:document.getElementById('ef-video').value.trim()||''
  };
  S.exercices.push(newExo);
  persist();
  saveExoCustomToSupa(newExo);
  closeModal();
  if(S.screen==='exercices') render.exercices();
  toast('✓ '+nom+' créé');
}

function saveExo(id){
  const exo=S.exercices.find(e=>e.id===id);if(!exo)return;
  exo.nom=document.getElementById('ef-nom').value.trim()||exo.nom;
  exo.cat=document.getElementById('ef-cat').value;
  exo.desc=document.getElementById('ef-desc').value.trim()||'';
  exo.video=document.getElementById('ef-video').value.trim()||'';
  persist();
  supa('PATCH','exercices',{nom:exo.nom,cat:exo.cat,desc_exercice:exo.desc,video:exo.video},'?id=eq.'+id);
  closeModal();
  if(S.screen==='exercices') render.exercices();
  toast('✓ Modifié');
}

function showExoDetailModal(id){
  const exo=S.exercices.find(e=>e.id===id);if(!exo)return;
  const videoBtn=exo.video?'<a href="'+exo.video+'" target="_blank" class="btn btn-ghost" style="text-decoration:none;margin-bottom:12px">🎬 Voir la vidéo</a>':'';
  openModal(
    '<div class="modal-title">'+exo.nom+'</div>'+
    '<span class="badge badge-green" style="margin-bottom:12px;display:inline-block">'+exo.cat+'</span>'+
    (exo.desc?'<p style="margin-top:10px;font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px">'+exo.desc+'</p>':'')+
    videoBtn+
    '<div style="display:flex;gap:8px;margin-top:8px">'+
    '<button class="btn btn-secondary" style="flex:1" onclick="closeModal();showEditExoModal(\''+exo.id+'\')">✏️ Modifier</button>'+
    '</div>'
  );
}

async function startApp(){
  const shell=document.getElementById('auth-shell');
  if(shell) shell.style.display='none';
  return initApp();
}

async function bootstrapAuth(){
  if(checkInviteToken()){
    return;
  }
  const ok=await checkSavedSession();
  if(ok){
    return startApp();
  }
  currentIsCoach=false;
  const shell=document.getElementById('auth-shell');
  if(shell) shell.style.display='flex';
  document.getElementById('setpw-screen').style.display='none';
  document.getElementById('login-screen').style.display='block';
}

async function startApp(){
  const shell=document.getElementById('auth-shell');
  if(shell) shell.style.display='none';
  return initApp();
}

async function initApp(){
  initTheme();
  await loadIaApiKey();
  const isCoach=currentUserEmail && currentUserEmail.toLowerCase()===COACH_EMAIL.toLowerCase();
  currentIsCoach=!!isCoach;

  if(isCoach){
    const bn=document.getElementById('bottom-nav');
    if(bn) bn.style.display='';
    showScreen('clients');
    document.getElementById('clients-list').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;padding:60px 0;gap:12px"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite"></div><div style="font-size:13px;color:var(--text3)">Synchronisation…</div></div>`;
    await Promise.all([syncClients(),syncCustomAliments(),syncRecettes()]);
    render.clients();
    syncExercices();
    return;
  }

  const bn=document.getElementById('bottom-nav');
  if(bn) bn.style.display='none';
  showScreen('menu');
  document.getElementById('menu-grid').innerHTML=`<div style="display:flex;align-items:center;justify-content:center;padding:60px 0"><div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite"></div></div>`;

  let clientRecord=null;
  if(authUserId){
    const byUid=await supa('GET','clients','',`?user_id=eq.${authUserId}&limit=1`);
    if(byUid&&byUid.length) clientRecord=byUid[0];
  }
  if(!clientRecord && currentUserEmail){
    const byEmail=await supa('GET','clients','',`?email=eq.${encodeURIComponent(currentUserEmail)}&limit=1`);
    if(byEmail&&byEmail.length){
      clientRecord=byEmail[0];
      if(!clientRecord.user_id && authUserId){
        await supa('PATCH','clients',{user_id:authUserId},`?id=eq.${clientRecord.id}`);
        clientRecord.user_id=authUserId;
      }
    }
  }

  if(!clientRecord){
    document.getElementById('menu-grid').innerHTML=`<div class="empty"><div class="empty-icon">❌</div><div class="empty-title">Profil introuvable</div><div class="empty-sub">Ton profil n'a pas encore été créé. Contacte ton coach.</div></div>`;
    setTopbar('Mon profil','');
    document.getElementById('back-btn').style.display='none';
    document.getElementById('topbar-action').innerHTML=`<div class="icon-btn" onclick="logout()" title="Déconnexion"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>`;
    return;
  }

  S.client=clientRecord;
  S.clients=[S.client];
  await syncCustomAliments();
  await syncRecettes();
  await syncClientData(clientRecord.id);

  document.getElementById('back-btn').style.display='none';
  setTopbar(S.client.prenom+' '+S.client.nom,'');
  document.getElementById('topbar-action').innerHTML=`<div class="icon-btn" onclick="logout()" title="Déconnexion"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>`;
  render.menu();
}
bootstrapAuth();

let calcView = 'calcul';

function switchCalcView(view){
  calcView = view;
  document.querySelectorAll('.calc-view').forEach(el=>el.style.display='none');
  document.getElementById('view-'+view).style.display='block';

  document.getElementById('btn-calcul').classList.toggle('active', view==='calcul');
  document.getElementById('btn-blocs').classList.toggle('active', view==='blocs');
}


function startBlockPlan(){
  if(!S.client) return;

  const bp = readBlockPlanForm();
  const startInput = document.getElementById('bp-start-date');
  if(startInput && startInput.value){
    bp.startDate = startInput.value;
  }

  bp.active = true;
  S.client.blockPlan = bp;
  persist();

  if(typeof refreshBlockPlannerInPlace === 'function'){
    refreshBlockPlannerInPlace();
  }

  if(S.screen === 'suivi'){
    render.suivi();
  }

  toast('Bloc activé');
}
