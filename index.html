// ─────────────────────────────────────────
S.restTimer={active:false,remaining:0,total:0,_interval:null};

function startRestTimer(seconds){
  if(!seconds||seconds<=0)return;
  stopRestTimer();
  // Demander la permission de notification si pas encore accordée
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
  S.restTimer={active:true,remaining:seconds,total:seconds,_interval:null};
  renderRestTimerOverlay();
  S.restTimer._interval=setInterval(()=>{
    S.restTimer.remaining--;
    if(S.restTimer.remaining<=0){
      stopRestTimer();
      if(navigator.vibrate) navigator.vibrate([150,80,150,80,150]);
      // Notification web
      if('Notification' in window && Notification.permission==='granted'){
        new Notification('💪 Repos terminé !',{
          body:'C\'est reparti !',
          icon:'https://margotcoaching16-ship-it.github.io/Coaching-App/favicon.ico',
          silent:false
        });
      }
      toast('✅ Repos terminé !');
    } else {
      updateRestTimerDisplay();
    }
  },1000);
}

function stopRestTimer(){
  if(S.restTimer._interval) clearInterval(S.restTimer._interval);
  S.restTimer={active:false,remaining:0,total:0,_interval:null};
  const el=document.getElementById('rest-timer-overlay');
  if(el){el.classList.remove('active');el.innerHTML='';}
}

function adjustRestTimer(delta){
  if(!S.restTimer.active)return;
  S.restTimer.remaining=Math.max(1,S.restTimer.remaining+delta);
  if(delta>0) S.restTimer.total=Math.max(S.restTimer.total,S.restTimer.remaining);
  updateRestTimerDisplay();
}

function updateRestTimerDisplay(){
  const countEl=document.getElementById('rtimer-count');
  if(countEl){
    const m=Math.floor(S.restTimer.remaining/60);
    const s=S.restTimer.remaining%60;
    countEl.textContent=m>0?`${m}:${String(s).padStart(2,'0')}`:S.restTimer.remaining+'s';
  }
  const circEl=document.getElementById('rtimer-arc');
  if(circEl){
    const circ=2*Math.PI*38;
    const pct=S.restTimer.remaining/S.restTimer.total;
    circEl.style.strokeDashoffset=circ*(1-pct);
  }
}

function renderRestTimerOverlay(){
  const el=document.getElementById('rest-timer-overlay');
  if(!el)return;
  const circ=2*Math.PI*38;
  const m=Math.floor(S.restTimer.remaining/60);
  const s=S.restTimer.remaining%60;
  const timeStr=m>0?`${m}:${String(s).padStart(2,'0')}`:S.restTimer.remaining+'s';
  el.innerHTML=`
    <div style="font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.6px;text-transform:uppercase">Temps de repos</div>
    <div style="position:relative;width:96px;height:96px">
      <svg width="96" height="96" viewBox="0 0 96 96" style="transform:rotate(-90deg)">
        <circle cx="48" cy="48" r="38" fill="none" stroke="var(--border)" stroke-width="5"/>
        <circle id="rtimer-arc" cx="48" cy="48" r="38" fill="none" stroke="var(--green)" stroke-width="5"
          stroke-dasharray="${circ}" stroke-dashoffset="0"
          style="transition:stroke-dashoffset .9s linear;stroke-linecap:round"/>
      </svg>
      <div id="rtimer-count" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--text)">${timeStr}</div>
    </div>
    <div style="display:flex;gap:6px">
      <button class="btn btn-secondary btn-sm" style="width:auto;padding:0 10px" onclick="adjustRestTimer(-15)">−15s</button>
      <button class="btn btn-secondary btn-sm" style="width:auto;padding:0 10px" onclick="adjustRestTimer(30)">+30s</button>
      <button class="btn btn-primary btn-sm" style="width:auto;padding:0 12px" onclick="stopRestTimer()">Skip ⏭</button>
    </div>`;
  el.classList.add('active');
}

function updateLogSerie(ei,si,field,val,inputEl){

function showWeeklyRecap(clientId, periodOffset){
  const cid=clientId||S.client?.id;
  const offset=periodOffset||0; // 0=7 derniers jours, -1=7j avant, etc.
  const client=S.clients.find(c=>c.id===cid)||S.client;
  if(!cid||!client)return;

  // Période : 7 jours glissants avec navigation
  const now=new Date(); now.setHours(23,59,59,999);
  const endDate=new Date(now); endDate.setDate(now.getDate()+offset*7);
  const startDate=new Date(endDate); startDate.setDate(endDate.getDate()-6); startDate.setHours(0,0,0,0);

  // Tous les logs du client triés chronologiquement
  const allLogs=S.logsSeances.filter(l=>l.client_id===cid).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const periodLogs=allLogs.filter(l=>{ const d=new Date(l.date); return d>=startDate&&d<=endDate; });

  const fmtDate=d=>d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  const dateRange=`${fmtDate(startDate)} – ${fmtDate(endDate)}`;
  const cidStr=JSON.stringify(cid);

  // Navigation prev/next
  const navHtml=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px">
    <button onclick="closeModal();showWeeklyRecap(${cidStr},${offset-1})" style="background:var(--bg2);border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer;color:var(--text)">◀</button>
    <div style="text-align:center;flex:1">
      <div style="font-size:13px;font-weight:700;color:var(--text)">${client.prenom} ${client.nom}</div>
      <div style="font-size:11px;color:var(--text3);margin-top:1px">${dateRange}</div>
    </div>
    <button onclick="closeModal();showWeeklyRecap(${cidStr},${offset+1})" style="background:var(--bg2);border:none;border-radius:8px;padding:6px 12px;font-size:16px;cursor:pointer;color:${offset<0?'var(--text)':'var(--text3)'};pointer-events:${offset<0?'auto':'none'}">▶</button>
  </div>`;

  let html=`<div class="modal-title">📊 Récap perfs</div>${navHtml}`;

  if(!periodLogs.length){
    html+=`<div class="empty" style="padding:20px 0"><div class="empty-icon">😴</div><div class="empty-title">Aucune séance sur cette période</div></div>`;
    openModal(html); return;
  }

  // ── Par séance (ordre antéchronologique dans l'affichage) ──
  periodLogs.slice().reverse().forEach(log=>{
    const logDate=new Date(log.date);
    html+=`<div style="margin-bottom:18px">
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border)">
        🏋️ ${logDate.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})} — ${log.seance_nom}
      </div>`;

    (log.exercices||[]).forEach(exo=>{
      const isCardio=exo.cat==='Cardio';

      // Trouver la session précédente (avant ce log) où cet exo apparaît
      const prevLog=allLogs.filter(l=>new Date(l.date)<new Date(log.date)&&(l.exercices||[]).some(e=>e.exo_id===exo.exo_id)).slice(-1)[0];
      const prevExo=prevLog?(prevLog.exercices||[]).find(e=>e.exo_id===exo.exo_id):null;

      let perfLine=''; let badge='';

      if(isCardio){
        const dur=Math.max(...(exo.series||[]).map(s=>parseFloat(s.duree)||0).filter(v=>v>0),0);
        const prevDur=prevExo?Math.max(...(prevExo.series||[]).map(s=>parseFloat(s.duree)||0).filter(v=>v>0),0):0;
        if(!dur){ perfLine='<span style="color:var(--text3)">—</span>'; }
        else if(!prevDur){ perfLine=`<strong>${dur} min</strong> <span style="color:var(--text3);font-size:11px">1ère fois</span>`; badge='🆕'; }
        else {
          const diff=dur-prevDur;
          if(diff>0){ perfLine=`<strong>${dur} min</strong> <span style="color:var(--green)">▲ +${diff}min</span>`; badge='🏆'; }
          else if(diff<0){ perfLine=`<strong>${dur} min</strong> <span style="color:var(--red)">▼ ${diff}min</span>`; badge='📉'; }
          else { perfLine=`<strong>${dur} min</strong> <span style="color:var(--text3)">= même</span>`; }
        }
      } else {
        const maxPoids=Math.max(...(exo.series||[]).map(s=>parseFloat(s.poids)||0).filter(v=>v>0),0);
        const maxReps=Math.max(...(exo.series||[]).map(s=>parseInt(s.reps)||0).filter(v=>v>0),0);
        const prevMaxPoids=prevExo?Math.max(...(prevExo.series||[]).map(s=>parseFloat(s.poids)||0).filter(v=>v>0),0):0;
        const prevMaxReps=prevExo?Math.max(...(prevExo.series||[]).map(s=>parseInt(s.reps)||0).filter(v=>v>0),0):0;

        if(!maxPoids&&!maxReps){ perfLine='<span style="color:var(--text3)">— pas de données</span>'; }
        else if(!prevExo){
          perfLine=`<strong>${maxPoids?maxPoids+'kg ':''}</strong><strong>${maxReps?'× '+maxReps+' reps':''}</strong> <span style="color:var(--text3);font-size:11px">1ère fois</span>`;
          badge='🆕';
        } else {
          const diffP=maxPoids-prevMaxPoids; const diffR=maxReps-prevMaxReps;
          let parts=[];
          if(maxPoids||prevMaxPoids){
            if(diffP>0) parts.push(`<strong>${maxPoids}kg</strong> <span style="color:var(--green)">▲ +${diffP}kg</span>`);
            else if(diffP<0) parts.push(`<strong>${maxPoids}kg</strong> <span style="color:var(--red)">▼ ${diffP}kg</span>`);
            else parts.push(`<strong>${maxPoids}kg</strong> <span style="color:var(--text3)">=</span>`);
          }
          if(maxReps||prevMaxReps){
            if(diffR>0) parts.push(`<strong>× ${maxReps}</strong> <span style="color:var(--green)">▲ +${diffR}</span>`);
            else if(diffR<0) parts.push(`<strong>× ${maxReps}</strong> <span style="color:var(--red)">▼ ${diffR}</span>`);
            else parts.push(`<strong>× ${maxReps}</strong> <span style="color:var(--text3)">=</span>`);
          }
          perfLine=parts.join(' · ');
          if(diffP>0||diffR>0) badge='🏆';
          else if(diffP<0||diffR<0) badge='📉';
        }
      }

      const prevDateStr=prevLog?`<span style="font-size:10px;color:var(--text3)">vs ${fmtDate(new Date(prevLog.date))}</span>`:'';

      html+=`<div style="background:var(--bg2);border-radius:8px;padding:8px 10px;margin-bottom:5px">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <span style="font-size:13px;font-weight:600">${exo.nom}</span>
            ${exo._replacedFrom?`<span style="font-size:10px;color:var(--amber);margin-left:5px">🔄 remplace ${exo._replacedFrom}</span>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:5px">${prevDateStr}${badge?`<span style="font-size:14px">${badge}</span>`:''}</div>
        </div>
        <div style="font-size:12px;margin-top:3px">${perfLine}</div>
        ${exo.commentaire&&exo.commentaire.trim()?`<div style="margin-top:6px;padding:5px 8px;background:var(--amber-light);border-left:3px solid var(--amber);border-radius:0 6px 6px 0;font-size:12px;color:var(--text)">💬 ${exo.commentaire}</div>`:''}
      </div>`;
    });

    html+=`</div>`;
  });

  openModal(html);
}

function showSwapExoModal(ei){
  const exo=S.logSeance?.exercices[ei];if(!exo)return;
  const cats=[...new Set(S.exercices.map(e=>e.cat))].sort();
  const listHtml=cats.map(cat=>{
    const exos=S.exercices.filter(e=>e.cat===cat&&e.id!==exo.exo_id);
    if(!exos.length)return'';
    return`<div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">${cat}</div>
      ${exos.map(e=>`<div class="swap-exo-row" onclick="swapLogExo(${ei},'${e.id}','${e.nom.replace(/'/g,"\\'")}','${e.cat}'${e.video?`,'${e.video}'`:''})">${e.nom}</div>`).join('')}
    </div>`;
  }).join('');
  openModal(`
    <div class="modal-title">🔄 Remplacer : ${exo.nom}</div>
    <input class="form-inp" id="swap-search" placeholder="Rechercher un exercice…" oninput="filterSwapList(this.value)" style="margin-bottom:12px"/>
    <div id="swap-list" style="max-height:55vh;overflow-y:auto">${listHtml}</div>
  `);
  setTimeout(()=>document.getElementById('swap-search')?.focus(),300);
  window._swapListHtml=listHtml;
  window._swapEi=ei;
}

function filterSwapList(q){
  const list=document.getElementById('swap-list');if(!list)return;
  if(!q.trim()){list.innerHTML=window._swapListHtml;return;}
  const lq=q.toLowerCase();
  const matches=S.exercices.filter(e=>e.nom.toLowerCase().includes(lq));
  list.innerHTML=matches.length
    ?matches.map(e=>`<div class="swap-exo-row" onclick="swapLogExo(${window._swapEi},'${e.id}','${e.nom.replace(/'/g,"\\'")}','${e.cat}'${e.video?`,'${e.video}'`:''})">${e.nom} <span style="font-size:11px;color:var(--text3)">${e.cat}</span></div>`).join('')
    :'<div style="color:var(--text3);font-size:13px;padding:8px">Aucun résultat</div>';
}

function swapLogExo(ei, newExoId, newNom, newCat, newVideo){
  const logExos=S.logSeance?.exercices;if(!logExos||!logExos[ei])return;
  const original=logExos[ei];
  // Garder la structure (séries, méthode, etc.) — changer seulement l'identité
  logExos[ei]={
    ...original,
    exo_id:newExoId,
    nom:newNom,
    cat:newCat,
    video:newVideo||'',
    _replacedFrom:original._replacedFrom||original.nom // conserver l'original de base
  };
  lsSet('c_activeLog',S.logSeance);
  closeModal();
  render.log();
  toast(`🔄 ${original.nom} → ${newNom}`);
}

async function createClient(){
  const prenom=document.getElementById('m-prenom').value.trim();
  const nom=document.getElementById('m-nom').value.trim();
  const email=(document.getElementById('m-email').value||'').trim().toLowerCase();
  const objectif=document.getElementById('m-obj').value.trim();

  if(!prenom||!nom){
    toast('⚠ Prénom et nom obligatoires');
    return;
  }
  if(!email){
    toast('⚠ Adresse mail obligatoire');
    return;
  }

  const newClient={
    id:(globalThis.crypto&&crypto.randomUUID)?crypto.randomUUID():uid(),
    prenom,
    nom,
    email,
    user_id:null,
    objectif,
    favori:false,
    archive:false,
    calculsPerte:defaultCalculsPerte()
  };

  S.clients.push(newClient);
  persist();
  closeModal();
  render.clients();
  toast('✓ Client créé');

  const created=await supa('POST','clients',{
    id:newClient.id,
    prenom:newClient.prenom,
    nom:newClient.nom,
    email:newClient.email,
    user_id:newClient.user_id,
    objectif:newClient.objectif||null,
    favori:newClient.favori||false,
    archive:newClient.archive||false
  });

  if(!created){
    toast('⚠ Client créé localement, mais non synchronisé avec Supabase');
    return;
  }

  await syncClients();
  render.clients();
}

function confirmAddExo(exoId){
  const exo=S.exercices.find(e=>e.id===exoId);if(!exo||!S.seanceType)return;
  const isCardio=exo.cat==='Cardio';
  const notes=document.getElementById('nc-notes').value||'';
  let nb_series,repos,reps_min,reps_max,duree_min;
  if(isCardio){
    duree_min=parseInt(document.getElementById('nc-duree').value)||20;
    nb_series=1;repos=0;reps_min=0;reps_max=0;
  } else {
    nb_series=parseInt(document.getElementById('nc-series').value)||3;
    repos=parseInt(document.getElementById('nc-repos').value)||90;
    reps_min=parseInt(document.getElementById('nc-rmin').value)||8;
    reps_max=parseInt(document.getElementById('nc-rmax').value)||12;
  }
  const newExoEntry={exo_id:exoId,nom:exo.nom,cat:exo.cat,desc:exo.desc||'',video:exo.video||'',nb_series,reps_min,reps_max,repos,notes,...(isCardio?{duree_min}:{})};
  S.seanceType.exercices.push(newExoEntry);
  const idx=S.seancesType.findIndex(s=>s.id===S.seanceType.id);
  if(idx>=0)S.seancesType[idx]=S.seanceType;
  // Si une séance est en cours pour ce type, on l'ajoute aussi au log actif
  if(S.logSeance&&S.logSeance.seance_type_id===S.seanceType.id){
    S.logSeance.exercices.push({
      exo_id:exoId,nom:exo.nom,cat:exo.cat,video:exo.video||'',desc:exo.desc||'',notes:notes,
      duree_min:duree_min||0,nb_series,reps_min,reps_max,methode:null,supersetWith:null,
      series:Array.from({length:isCardio?1:nb_series},()=>isCardio?{duree:'',done:false}:{poids:'',reps:'',done:false})
    });
    lsSet('c_activeLog',S.logSeance);
  }
  persist();saveSeanceTypeToSupa(S.seanceType);closeModal();render.seance();toast(`✓ ${exo.nom} ajouté`);
}

// RENDER: HISTORIQUE PAR EXERCICE
// ─────────────────────────────────────────
render.historique=function(){
  const exo=S.currentExo;
  setTopbar(exo.nom, exo.cat, '');

  // Collect all logs for this client + this exercise
  const logs=[];
  S.logsSeances
    .filter(l=>l.client_id===S.client.id)
    .sort((a,b)=>new Date(b.date)-new Date(a.date))
    .forEach(log=>{
      const found=log.exercices&&log.exercices.find(e=>e.exo_id===exo.id);
      const hasData=found&&found.series&&found.series.some(s=>s.poids||s.reps||s.duree);
      if(hasData) logs.push({date:log.date, seance_nom:log.seance_nom, series:found.series||[]});
    });

  const el=document.getElementById('historique-content');

  if(!logs.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📈</div><div class="empty-title">Pas encore d'historique</div><div class="empty-sub">Les performances apparaîtront ici après chaque séance</div></div>`;
    return;
  }

  // Compute records
  let maxPoids=null, maxPoidsReps=null, minPoids=null, minPoidsReps=null;
  logs.forEach(log=>{
    log.series.forEach(s=>{
      const p=parseFloat(s.poids);const r=parseInt(s.reps);
      if(!isNaN(p)&&p>0){
        if(maxPoids===null||p>maxPoids){maxPoids=p;maxPoidsReps=r;}
        if(minPoids===null||p<minPoids){minPoids=p;minPoidsReps=r;}
      }
    });
  });

  let html='';

  // Records banner
  if(maxPoids!==null){
    html+=`<div class="record-banner">
      <div class="record-item">
        <div class="record-label">🏆 Poids max</div>
        <div class="record-val">${maxPoids} kg</div>
        <div class="record-sub">${maxPoidsReps?maxPoidsReps+' reps':''}</div>
      </div>
      <div style="width:.5px;background:var(--amber);opacity:.4"></div>
      <div class="record-item">
        <div class="record-label">📉 Poids min</div>
        <div class="record-val">${minPoids} kg</div>
        <div class="record-sub">${minPoidsReps?minPoidsReps+' reps':''}</div>
      </div>
      <div style="width:.5px;background:var(--amber);opacity:.4"></div>
      <div class="record-item">
        <div class="record-label">📅 Séances</div>
        <div class="record-val">${logs.length}</div>
        <div class="record-sub">au total</div>
      </div>
    </div>`;
  }

  // Session history
  logs.forEach(log=>{
    const dateStr=new Date(log.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const filledSeries=log.series.filter(s=>s.poids||s.reps);
    if(!filledSeries.length) return;

    // Find best serie of this session
    let bestP=null;
    filledSeries.forEach(s=>{const p=parseFloat(s.poids);if(!isNaN(p)&&(bestP===null||p>bestP))bestP=p;});

    html+=`<div class="hist-session">
      <div class="hist-session-header">
        <div class="hist-date">
          <div class="hist-date-main">${dateStr}</div>
          <div class="hist-date-sub">${log.seance_nom}</div>
        </div>
        ${bestP!==null&&bestP===maxPoids?`<span class="badge badge-amber">🏆 Record</span>`:''}
      </div>
      <div class="hist-series-wrap">
        <div style="display:grid;grid-template-columns:20px 1fr 1fr 20px;gap:6px;margin-bottom:6px">
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">#</span>
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">Poids</span>
          <span style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase">Reps</span>
          <span></span>
        </div>
        ${filledSeries.map((s,i)=>`<div class="hist-serie-row">
          <span class="hist-serie-num">${i+1}</span>
          <span class="hist-serie-val">${s.poids?s.poids+' kg':'—'}</span>
          <span class="hist-serie-val">${s.reps?s.reps+' reps':'—'}</span>
          <span class="hist-serie-done">${s.done?'✅':'⬜'}</span>
        </div>`).join('')}
      </div>
    </div>`;
  });

  el.innerHTML=html;
};

render.exercices=function(filter=''){
  setTopbar("Exercices",'',`<div class="icon-btn" onclick="showNewExoModal()">＋</div>`);
  const el=document.getElementById('exercices-content');if(!el)return;
  const cats=[...new Set(S.exercices.map(e=>e.cat))].sort();
  let list=S.exercices;
  if(filter) list=list.filter(e=>e.nom.toLowerCase().includes(filter.toLowerCase())||e.cat.toLowerCase().includes(filter.toLowerCase()));

  let html='<div style="padding:10px 16px 0"><input class="form-inp form-inp-sm" placeholder="Rechercher un exercice..." oninput="render.exercices(this.value)" style="margin-bottom:12px" /></div>';

  cats.forEach(cat=>{
    const catExos=list.filter(e=>e.cat===cat);
    if(!catExos.length) return;
    html+='<div class="section-label">'+cat+'</div>';
    catExos.forEach(exo=>{
      const isCustom=exo.id.startsWith('c');
      const videoBtn=exo.video?'<a href="'+exo.video+'" target="_blank" class="icon-btn" style="text-decoration:none;font-size:16px">🎬</a>':'';
      const deleteBtn=isCustom?'<button class="icon-btn" onclick="_deleteExo(\''+exo.id+'\')">🗑</button>':'';
      html+='<div class="exo-list-row">'+
        '<div class="exo-list-info" onclick="showExoDetailModal(\''+exo.id+'\')">'+
        '<div class="exo-list-name">'+exo.nom+(isCustom?' <span class="badge badge-green" style="font-size:10px;padding:1px 6px">perso</span>':'')+'</div>'+
        '<div class="exo-list-meta">'+(exo.desc||'')+(exo.video?' · 🎬 vidéo':'')+'</div>'+

  if(!list.length) html+='<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">Aucun exercice trouvé</div></div>';
  html+='<div style="padding:16px"><button class="btn btn-primary" onclick="showNewExoModal()">+ Créer un exercice</button></div>';
  el.innerHTML=html;
};


render.bilanHebdo=function(){
  const c=S.client;
  setTopbar('Bilan hebdomadaire', c.prenom+' '+c.nom, '');

  // Current week
  const thisWeek=getMondayStr();
  if(!S.bhCurrentDate) S.bhCurrentDate=thisWeek;

  // Get all weeks that have a bilan + current week
  const existingDates=getClientBilanDates(c.id);
  const allWeeks=[...new Set([thisWeek,...existingDates])].sort((a,z)=>z.localeCompare(a));

  const el=document.getElementById('bilanHebdo-content');

  // Week selector
  const weekSelector=`<div class="bh-date-selector">
    ${allWeeks.map(w=>{
      const d=new Date(w);
      const label=w===thisWeek?'Cette semaine':d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
      return `<button class="bh-date-chip${S.bhCurrentDate===w?' active':''}" onclick="setBhDate('${w}')">${label}</button>`;
    }).join('')}
    <button class="bh-date-chip" onclick="addBilanWeek()" style="color:var(--green);border-color:var(--green)">+ Semaine</button>
  </div>`;

  // Tabs
  const tabs=`<div class="bh-tabs">
    <button class="bh-tab${S.bhTab==='photos'?' active':''}" onclick="setBhTab('photos')">📸 Photos/Mensurations</button>
    <button class="bh-tab${S.bhTab==='comparaison'?' active':''}" onclick="setBhTab('comparaison')">🔄 Comparaison</button>
    <button class="bh-tab${S.bhTab==='resultats'?' active':''}" onclick="setBhTab('resultats')">📊 Résultats</button>
  </div>`;

  const bilan=getOrCreateBilanHebdo(c.id,S.bhCurrentDate);

  let tabContent='';
  if(S.bhTab==='photos') tabContent=renderBhPhotos(bilan,allWeeks);
  else if(S.bhTab==='comparaison') tabContent=renderBhComparaison(c.id,allWeeks);
  else if(S.bhTab==='resultats') tabContent=renderBhResultats(c.id);

  el.innerHTML=weekSelector+tabs+tabContent;
};

function renderBhPhotos(bilan, allWeeks){
  const slots=[
    {key:'face',label:'Face',icon:'🧍'},
    {key:'gauche',label:'Profil G.',icon:'🧍'},
    {key:'droit',label:'Profil D.',icon:'🧍'},
    {key:'dos',label:'Dos',icon:'🧍'},
  ];
  let html='<div class="photo-grid">';
  slots.forEach(s=>{
    const img=bilan.photos[s.key];
    const overlay=img?'<div class="photo-overlay"><span style="color:#fff;font-size:11px;font-weight:600">'+s.label+'</span><button onclick="event.stopPropagation();_deletePhoto(\''+bilan.id+'\',\''+s.key+'\') " style="background:rgba(0,0,0,.5);border:none;border-radius:50%;width:24px;height:24px;color:#fff;cursor:pointer;font-size:12px">✕</button></div>':'';
    const imgTag=img?'<img src="'+img+'" alt="'+s.label+'" />':'';
    const icon=img?'':'<div class="photo-slot-icon">'+s.icon+'</div><div class="photo-slot-label">'+s.label+'</div>';
    html+='<div class="photo-slot'+(img?' filled':'')+'" onclick="triggerPhotoUpload(\''+bilan.id+'\',\''+s.key+'\')">'+imgTag+icon+overlay+'<input type="file" id="photo-input-'+bilan.id+'-'+s.key+'" accept="image/*" capture="environment" style="display:none" onchange="handlePhotoUpload(\''+bilan.id+'\',\''+s.key+'\',this)" /></div>';
  });
  html+='</div>';
  // ── Mensurations ──
  const prevDate=allWeeks?(allWeeks.find(w=>w<S.bhCurrentDate)||null):null;
  const prevBilan=prevDate?getBilanHebdo(S.client.id,prevDate):null;
  const mensuFields=[
    {key:'poitrine',label:'Poitrine'},
    {key:'taille',label:'Taille'},
    {key:'fessiers',label:'Fessiers'},
    {key:'cuisses',label:'Cuisses'},
    {key:'bras',label:'Bras'},
  ];
  function diffHtml(key){
    if(!prevBilan)return'';
    const curr=parseFloat(bilan.mensurations[key]);
    const prev=parseFloat(prevBilan.mensurations[key]);
    if(isNaN(curr)||isNaN(prev)||!prev)return'';
    const diff=curr-prev;
    if(diff===0)return'<span style="color:var(--text3);font-size:11px">= stable</span>';
    const cls=diff<0?'mensu-diff-pos':'mensu-diff-neg';
    return'<span class="'+cls+'">'+(diff>0?'+':'')+diff.toFixed(1)+' cm</span>';
  }
  html+='<div style="padding:12px 16px 0"><div style="font-size:13px;font-weight:700;margin-bottom:8px;color:var(--text1)">📏 Mensurations</div><div class="mensuration-grid">';
  mensuFields.forEach(f=>{
    const prevVal=prevBilan&&prevBilan.mensurations[f.key]?'Préc: '+prevBilan.mensurations[f.key]+'cm · '+diffHtml(f.key):(prevDate?'Préc: —':'');
    html+='<div class="mensu-item">'+
      '<div class="mensu-label">'+f.label+'</div>'+
      '<div style="display:flex;align-items:center;gap:4px">'+
      '<input class="mensu-inp" type="number" step="0.5" min="0" placeholder="—" value="'+(bilan.mensurations[f.key]||'')+'" oninput="updateMensuration(\''+bilan.id+'\',\''+f.key+'\',this.value)" />'+
      '<span style="font-size:12px;color:var(--text3)">cm</span></div>'+
      '<div class="mensu-prev">'+prevVal+'</div></div>';
  });
  html+='</div></div>';
  html+='<div style="padding:12px 16px 0">'+
    '<div class="form-group"><label class="form-label">Notes (optionnel)</label>'+
    '<textarea class="checkin-textarea" rows="2" placeholder="Ressenti, observations..." oninput="updateBilanNotes(\''+bilan.id+'\',this.value)">'+( bilan.notes||'')+'</textarea></div>'+
    '<button class="btn btn-primary" onclick="saveBilanHebdo(\''+bilan.id+'\')">Sauvegarder</button></div>';
  return html;
}

function renderBhComparaison(clientId, allWeeks){
  if(allWeeks.length<1)return'<div class="empty" style="padding:40px 24px"><div class="empty-icon">🔄</div><div class="empty-title">Pas encore de bilans</div><div class="empty-sub">Ajoute des photos dans les bilans pour les comparer</div></div>';
  if(!S.bhCompareA)S.bhCompareA=allWeeks[0]||null;
  if(!S.bhCompareB)S.bhCompareB=allWeeks[1]||allWeeks[0]||null;
  const bilanA=S.bhCompareA?getBilanHebdo(clientId,S.bhCompareA):null;
  const bilanB=S.bhCompareB?getBilanHebdo(clientId,S.bhCompareB):null;
  const viewLabels={face:'Face',gauche:'Profil G.',droit:'Profil D.',dos:'Dos'};

  function wkLabel(d){
    if(!d)return'—';
    return d===getMondayStr()?'Cette semaine':new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'long'});
  }
  function photoCol(bilan,label){
    const src=bilan&&bilan.photos[S.bhCompareView];
    const inner=src?'<img src="'+src+'" style="width:100%;height:100%;object-fit:cover" />':'<div class="compare-photo-empty">Pas de photo<br>'+viewLabels[S.bhCompareView]+'</div>';
    return'<div><div style="font-size:11px;font-weight:600;color:var(--text3);text-align:center;margin-bottom:6px">'+label+'</div><div class="compare-photo-wrap">'+inner+'</div></div>';
  }

  const dateOptsA=allWeeks.map(w=>'<option value="'+w+'"'+(S.bhCompareA===w?' selected':'')+'>'+wkLabel(w)+'</option>').join('');
  const dateOptsB=allWeeks.map(w=>'<option value="'+w+'"'+(S.bhCompareB===w?' selected':'')+'>'+wkLabel(w)+'</option>').join('');
  const viewTabs=Object.keys(viewLabels).map(v=>'<button class="compare-view-tab'+(S.bhCompareView===v?' active':'')+'" onclick="S.bhCompareView=\''+v+'\';render.bilanHebdo()">'+viewLabels[v]+'</button>').join('');

  return'<div class="compare-date-row">'+
    '<div class="compare-date-wrap"><div class="compare-date-label">Semaine A</div><select class="compare-date-sel" onchange="S.bhCompareA=this.value;render.bilanHebdo()">'+dateOptsA+'</select></div>'+
    '<div class="compare-vs">VS</div>'+
    '<div class="compare-date-wrap"><div class="compare-date-label">Semaine B</div><select class="compare-date-sel" onchange="S.bhCompareB=this.value;render.bilanHebdo()">'+dateOptsB+'</select></div>'+
    '</div><div class="compare-view-tabs">'+viewTabs+'</div>'+
    '<div class="compare-photo-grid">'+photoCol(bilanA,wkLabel(S.bhCompareA))+photoCol(bilanB,wkLabel(S.bhCompareB))+'</div>'+
    (bilanA&&bilanB?renderMensuComparaison(bilanA,bilanB):'');
}


function renderMensuComparaison(a,b){
  const fields=[{key:'poitrine',label:'Poitrine'},{key:'taille',label:'Taille'},{key:'fessiers',label:'Fessiers'},{key:'cuisses',label:'Cuisses'},{key:'bras',label:'Bras'}];
  const hasData=fields.some(f=>a.mensurations[f.key]||b.mensurations[f.key]);
  if(!hasData)return'';
  let rows='';
  fields.forEach(f=>{
    const va=parseFloat(a.mensurations[f.key]);
    const vb=parseFloat(b.mensurations[f.key]);
    const diff=(!isNaN(va)&&!isNaN(vb))?va-vb:null;
    const diffStr=diff===null?'—':diff===0?'=':(diff>0?'+':'')+diff.toFixed(1)+'cm';
    const diffCls=diff===null?'':(diff<0?'mensu-diff-pos':'mensu-diff-neg');
    rows+='<tr style="border-bottom:.5px solid var(--border)">'+
      '<td style="padding:7px 10px;font-weight:500">'+f.label+'</td>'+
      '<td style="padding:7px 10px;text-align:center">'+(!isNaN(va)?va+'cm':'—')+'</td>'+
      '<td style="padding:7px 10px;text-align:center">'+(!isNaN(vb)?vb+'cm':'—')+'</td>'+
      '<td style="padding:7px 10px;text-align:center"><span class="'+diffCls+'">'+diffStr+'</span></td></tr>';
  });
  return'<div style="padding:0 16px;margin-top:8px">'+
    '<div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Mensurations comparées</div>'+
    '<div style="background:var(--bg2);border-radius:var(--radius-lg);overflow:hidden;border:.5px solid var(--border)">'+
    '<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>'+
    '<th style="padding:7px 10px;text-align:left;color:var(--text3);font-weight:700;font-size:10px;text-transform:uppercase;border-bottom:.5px solid var(--border)">Mesure</th>'+
    '<th style="padding:7px 10px;text-align:center;color:var(--text3);font-weight:700;font-size:10px;text-transform:uppercase;border-bottom:.5px solid var(--border)">A</th>'+
    '<th style="padding:7px 10px;text-align:center;color:var(--text3);font-weight:700;font-size:10px;text-transform:uppercase;border-bottom:.5px solid var(--border)">B</th>'+
    '<th style="padding:7px 10px;text-align:center;color:var(--text3);font-weight:700;font-size:10px;text-transform:uppercase;border-bottom:.5px solid var(--border)">Diff.</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}


function renderBhResultats(clientId){
  // ── Poids via check-ins ──
  const pts=(S.checkIns||[])
    .filter(c=>c.client_id===clientId && c.poids)
    .sort((a,b)=>a.date.localeCompare(b.date));

  let graphHtml='';
  if(pts.length<2){
    graphHtml=`<div class="empty" style="padding:28px 16px"><div class="empty-icon">⚖️</div><div class="empty-sub">Pas encore assez de données de poids (il en faut au moins 2 check-ins)</div></div>`;
  } else {
    const W=320,H=140,PL=36,PR=12,PT=12,PB=28;
    const vals=pts.map(p=>parseFloat(p.poids));
    const min=Math.min(...vals),max=Math.max(...vals);
    const range=max-min||1;
    const toX=i=>PL+(i/(pts.length-1))*(W-PL-PR);
    const toY=v=>PT+(H-PT-PB)*(1-(v-min)/range);
    const perte=vals[vals.length-1]-vals[0];
    const perteStr=(perte<=0?'':'+')+perte.toFixed(1)+' kg';
    const perteColor=perte<0?'var(--green)':perte>0?'var(--red)':'var(--text3)';

    const polyline=pts.map((p,i)=>`${toX(i).toFixed(1)},${toY(parseFloat(p.poids)).toFixed(1)}`).join(' ');
    // area fill path
    const areaPath=`M${toX(0).toFixed(1)},${toY(vals[0]).toFixed(1)} `+
      pts.map((p,i)=>`L${toX(i).toFixed(1)},${toY(parseFloat(p.poids)).toFixed(1)}`).join(' ')+
      ` L${toX(pts.length-1).toFixed(1)},${(H-PB)} L${PL},${(H-PB)} Z`;

    // x-axis labels: first, middle, last
    const xLabels=[0,Math.floor((pts.length-1)/2),pts.length-1].filter((v,i,a)=>a.indexOf(v)===i).map(i=>{
      const d=new Date(pts[i].date);
      const lbl=d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
      return `<text x="${toX(i).toFixed(1)}" y="${H-4}" text-anchor="middle" font-size="9" fill="var(--text3)">${lbl}</text>`;
    }).join('');
    // y-axis labels
    const yLabels=[min,max].map(v=>`<text x="${PL-4}" y="${toY(v)+4}" text-anchor="end" font-size="9" fill="var(--text3)">${v.toFixed(1)}</text>`).join('');

    graphHtml=`
      <div style="margin:0 16px 16px;background:var(--bg);border:.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;box-shadow:var(--shadow)">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
          <div style="font-size:13px;font-weight:700">Évolution du poids</div>
          <div style="font-size:18px;font-weight:800;color:${perteColor}">${perteStr}</div>
        </div>
        <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
          <defs>
            <linearGradient id="wgrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--green)" stop-opacity="0.18"/>
              <stop offset="100%" stop-color="var(--green)" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${areaPath}" fill="url(#wgrad)"/>
          <polyline points="${polyline}" fill="none" stroke="var(--green)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          ${pts.map((p,i)=>`<circle cx="${toX(i).toFixed(1)}" cy="${toY(parseFloat(p.poids)).toFixed(1)}" r="3" fill="var(--green)"/>`).join('')}
          ${xLabels}${yLabels}
          <line x1="${PL}" y1="${H-PB}" x2="${W-PR}" y2="${H-PB}" stroke="var(--border)" stroke-width=".5"/>
          <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${H-PB}" stroke="var(--border)" stroke-width=".5"/>
        </svg>
        <div style="display:flex;justify-content:space-between;margin-top:6px">
          <div style="text-align:center"><div style="font-size:10px;color:var(--text3)">Départ</div><div style="font-size:14px;font-weight:700">${vals[0].toFixed(1)} kg</div></div>
          <div style="text-align:center"><div style="font-size:10px;color:var(--text3)">Actuel</div><div style="font-size:14px;font-weight:700">${vals[vals.length-1].toFixed(1)} kg</div></div>
        </div>
        ${(()=>{const nb=getBadges5kg(clientId);if(!nb)return'';return`<div style="display:flex;justify-content:center;margin-top:10px"><span style="display:inline-flex;align-items:center;gap:3px;background:var(--amber-light);color:var(--amber);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px">🏆 −${nb*5} kg</span></div>`;})()}
      </div>`;
  }

  // ── Photos première vs dernière ──
  const bilansWithFace=(S.bilansHebdo||[])
    .filter(b=>b.client_id===clientId && b.photos?.face)
    .sort((a,b)=>a.date.localeCompare(b.date));

  let photoHtml='';
  if(bilansWithFace.length<1){
    photoHtml=`<div class="empty" style="padding:16px"><div class="empty-icon">📸</div><div class="empty-sub">Aucune photo face disponible pour l'instant</div></div>`;
  } else {
    const first=bilansWithFace[0];
    const last=bilansWithFace[bilansWithFace.length-1];
    const fmtDate=d=>new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
    const sameWeek=first.date===last.date;
    photoHtml=`<div style="margin:0 16px 16px">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px">Photos — début vs aujourd'hui</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div>
          <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Semaine du ${fmtDate(first.date)}</div>
          <div style="aspect-ratio:3/4;border-radius:var(--radius-lg);overflow:hidden;background:var(--bg2)">
            <img src="${first.photos.face}" style="width:100%;height:100%;object-fit:cover"/>
          </div>
        </div>
        <div>
          <div style="font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;margin-bottom:4px">${sameWeek?'(même semaine)':'Semaine du '+fmtDate(last.date)}</div>
          <div style="aspect-ratio:3/4;border-radius:var(--radius-lg);overflow:hidden;background:var(--bg2)">
            <img src="${last.photos.face}" style="width:100%;height:100%;object-fit:cover"/>
          </div>
        </div>
      </div>
    </div>`;
  }

  return `<div style="padding:14px 0 60px">${graphHtml}${photoHtml}</div>`;
}

function setBhTab(tab){S.bhTab=tab;render.bilanHebdo();}
function setBhDate(date){S.bhCurrentDate=date;render.bilanHebdo();}
function addBilanWeek(){
  openModal(`
    <div class="modal-title">Semaine à ajouter</div>
    <div class="form-group"><label class="form-label">Date de début (lundi)</label>
      <input class="form-inp" id="bh-new-date" type="date" value="${getMondayStr()}" /></div>
    <button class="btn btn-primary" onclick="confirmAddBilanWeek()">Ajouter</button>
  `);
}
function confirmAddBilanWeek(){
  const raw=document.getElementById('bh-new-date').value;
  if(!raw){toast('⚠ Sélectionne une date');return;}
  const monday=getMondayStr(raw);
  getOrCreateBilanHebdo(S.client.id,monday);
  persist();S.bhCurrentDate=monday;closeModal();render.bilanHebdo();
}

function triggerPhotoUpload(bilanId, slot){
  document.getElementById(`photo-input-${bilanId}-${slot}`)?.click();
}

function handlePhotoUpload(bilanId, slot, input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const b=S.bilansHebdo.find(x=>x.id===bilanId);
    if(b){b.photos[slot]=e.target.result;persist();render.bilanHebdo();toast('📸 Photo ajoutée');}
  };
  reader.readAsDataURL(file);
}

function deletePhoto(bilanId, slot){
  confirmDialog('Supprimer cette photo ?','Cette action est irréversible.','Supprimer',()=>{
  _deletePhoto(bilanId,slot);
  });
}
function _deletePhoto(bilanId,slot){
  const b=S.bilansHebdo.find(x=>x.id===bilanId);
  if(b){b.photos[slot]=null;persist();saveBilanHebdoToSupa(b);render.bilanHebdo();toast('Photo supprimée');}
}

function updateMensuration(bilanId, key, val){
  const b=S.bilansHebdo.find(x=>x.id===bilanId);
  if(b) b.mensurations[key]=val;
}

function updateBilanNotes(bilanId, val){
  const b=S.bilansHebdo.find(x=>x.id===bilanId);
  if(b) b.notes=val;
}

async function saveBilanHebdo(bilanId){
  const b=S.bilansHebdo.find(x=>x.id===bilanId);
  if(b) b.completed=true;
  persist();
  if(b) await saveBilanHebdoToSupa(b);
  toast('✅ Bilan sauvegardé');
}


function getMondayStr(input){
  const base=input?new Date(input+'T12:00:00'):new Date();
  const day=(base.getDay()+6)%7;
  base.setDate(base.getDate()-day);
  return base.toISOString().slice(0,10);
}

function getClientBilanDates(clientId){
  return (S.bilansHebdo||[])
    .filter(b=>b.client_id===clientId && b.date)
    .map(b=>b.date)
    .sort((a,b)=>b.localeCompare(a));
}

function getBilanHebdo(clientId,date){
  return (S.bilansHebdo||[]).find(b=>b.client_id===clientId && b.date===date) || null;
}

function getOrCreateBilanHebdo(clientId,date){
  if(!S.bilansHebdo) S.bilansHebdo=[];
  const monday=getMondayStr(date);
  let bilan=S.bilansHebdo.find(b=>b.client_id===clientId && b.date===monday);
  if(!bilan){
    bilan={
      id:'bh'+uid(),
      client_id:clientId,
      date:monday,
      photos:{face:null,gauche:null,droit:null,dos:null},
      mensurations:{poitrine:'',taille:'',fessiers:'',cuisses:'',bras:''},
      notes:''
    };
    S.bilansHebdo.push(bilan);
  }
  if(!bilan.photos) bilan.photos={face:null,gauche:null,droit:null,dos:null};
  if(!bilan.mensurations) bilan.mensurations={poitrine:'',taille:'',fessiers:'',cuisses:'',bras:''};
  return bilan;
}

function scoreClass(v){
  const n=parseInt(v,10);
  if(!n) return 'score-mid';
  if(n>=4) return 'score-good';
  if(n<=2) return 'score-bad';
  return 'score-mid';
}

function setCheckinField(key,val,rerender=false){
  if(!S.checkinData) S.checkinData={};
  S.checkinData[key]=val;
  if(rerender) render.checkin();
}

async function saveCheckin(){
  const c=S.client;
  if(!c) return;
  if(!S.checkinData?.date){ toast('Choisis une date'); return; }
  const ci={...S.checkinData, client_id:c.id};
  const idx=S.checkIns.findIndex(x=>x.client_id===c.id && x.date===ci.date);
  if(idx>=0) S.checkIns[idx]={...S.checkIns[idx], ...ci};
  else S.checkIns.push(ci);
  persist();
  await saveCheckinToSupa(ci);
  const fx=document.createElement('div');
  fx.className='checkin-success-flash';
  document.body.appendChild(fx);
  setTimeout(()=>fx.remove(), 600);
  toast('Check-in enregistré');
  setTimeout(()=>navigate('menu'), 380);
}

render.suivi=function(){
  const c=S.client;
  if(!c) return;
  setTopbar('Suivi des check-ins', c.prenom+' '+c.nom, '');
  const rows=(S.checkIns||[])
    .filter(ci=>ci.client_id===c.id)
    .sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const el=document.getElementById('suivi-content');
  if(!rows.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📊</div><div class="empty-title">Aucun check-in</div><div class="empty-sub">Commence par enregistrer un check-in quotidien</div></div>';
    return;
  }

  const byDate={};
  rows.forEach(ci=>{ if(ci.date) byDate[ci.date]=ci; });

  const mondays=[...new Set(rows.map(ci=>getMondayStr(ci.date)).filter(Boolean))]
    .sort((a,b)=>b.localeCompare(a));

  const dayNames=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

  function toNum(v){
    if(v===null || v===undefined || v==='') return null;
    const n=parseFloat(String(v).replace(',','.'));
    return Number.isFinite(n)?n:null;
  }
  function avg(arr){
    const vals=arr.map(toNum).filter(v=>v!==null);
    if(!vals.length) return null;
    return vals.reduce((a,b)=>a+b,0)/vals.length;
  }
  function fmtNum(v,d=1,suffix=''){
    return v===null ? '—' : (Math.round(v*(10**d))/(10**d)).toFixed(d).replace('.',',')+suffix;
  }
  function fmtDelta(v){
    if(v===null) return '—';
    const rounded=Math.round(v*10)/10;
    const sign=rounded>0?'+':'';
    return sign+String(rounded.toFixed(1)).replace('.',',')+' kg';
  }
  function textOrDash(v){
    if(v===null || v===undefined || v==='') return '—';
    return String(v)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }
  function yesNoTag(v){
    if(v==='oui') return '<span class="cell-tag tag-oui">oui</span>';
    if(v==='non') return '<span class="cell-tag tag-non">non</span>';
    return '<span class="cell-tag tag-non">—</span>';
  }
  function scoreOrDash(v){
    const n=toNum(v);
    return n===null ? '—' : '<span class="cell-score '+scoreClass(n)+'">'+n+'</span>';
  }

  const weeks=mondays.map(monday=>{
    const mondayDate=new Date(monday+'T12:00:00');
    const daysData=[0,1,2,3,4,5,6].map(offset=>{
      const d=new Date(mondayDate);
      d.setDate(d.getDate()+offset);
      const iso=d.toISOString().slice(0,10);
      return { offset, date:d, iso, ci:byDate[iso]||null };
    });

    const avgPoids=avg(daysData.map(x=>x.ci?.poids));
    const avgStress=avg(daysData.map(x=>x.ci?.stress));
    const avgSommeil=avg(daysData.map(x=>x.ci?.sommeil));
    const avgAppetit=avg(daysData.map(x=>x.ci?.appetit));
    const avgPas=avg(daysData.map(x=>x.ci?.pas));

    const blockMeta=getBlockMetaForDate(c,monday);
    return {
      monday,
      mondayDate,
      title: 'Semaine du '+mondayDate.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}) +
        (blockMeta ? ' <span style="margin-left:8px;font-weight:700;color:'+blockMeta.color+'">'+blockMeta.objective+' semaine '+blockMeta.week+'</span>' : ''),
      subLabel: blockMeta ? 'Phase '+blockMeta.phaseIndex : '',
      daysData,
      avgPoids,
      avgStress,
      avgSommeil,
      avgAppetit,
      avgPas,
      deltaPoids:null
    };
  });

  weeks.forEach((week,idx)=>{
    const prev=weeks[idx+1];
    if(prev && week.avgPoids!==null && prev.avgPoids!==null){
      week.deltaPoids=week.avgPoids-prev.avgPoids;
    }
  });

  const weekHtml=weeks.map(week=>{
    const summaryHtml=''+
      '<div style="display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:8px;padding:0 16px 10px;overflow-x:auto">'+
        '<div class="card" style="padding:10px 8px;text-align:center;margin-bottom:0"><div class="record-label" style="color:var(--text3)">Poids moy.</div><div class="record-val" style="font-size:18px;color:var(--text)">'+fmtNum(week.avgPoids,1,' kg')+'</div></div>'+
        '<div class="card" style="padding:10px 8px;text-align:center;margin-bottom:0"><div class="record-label" style="color:var(--text3)">Écart sem. préc.</div><div class="record-val" style="font-size:18px;color:'+(week.deltaPoids===null?'var(--text)':(week.deltaPoids<=0?'var(--green)':'var(--red)'))+'">'+fmtDelta(week.deltaPoids)+'</div></div>'+
        '<div class="card" style="padding:10px 8px;text-align:center;margin-bottom:0"><div class="record-label" style="color:var(--text3)">Stress moy.</div><div class="record-val" style="font-size:18px;color:var(--text)">'+fmtNum(week.avgStress,1,'')+'</div></div>'+
        '<div class="card" style="padding:10px 8px;text-align:center;margin-bottom:0"><div class="record-label" style="color:var(--text3)">Sommeil moy.</div><div class="record-val" style="font-size:18px;color:var(--text)">'+fmtNum(week.avgSommeil,1,'')+'</div></div>'+
        '<div class="card" style="padding:10px 8px;text-align:center;margin-bottom:0"><div class="record-label" style="color:var(--text3)">Appétit moy.</div><div class="record-val" style="font-size:18px;color:var(--text)">'+fmtNum(week.avgAppetit,1,'')+'</div></div>'+
        '<div class="card" style="padding:10px 8px;text-align:center;margin-bottom:0"><div class="record-label" style="color:var(--text3)">Pas moy.</div><div class="record-val" style="font-size:18px;color:var(--text)">'+fmtNum(week.avgPas,0,'')+'</div></div>'+
      '</div>';

    const days=week.daysData.map(({offset,date,ci})=>{
      return '<tr>'+
        '<td>'+dayNames[offset]+' '+date.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})+'</td>'+
        '<td>'+(ci&&ci.poids?String(ci.poids).replace('.',',')+' kg':'—')+'</td>'+
        '<td>'+yesNoTag(ci&&ci.ecarts)+'</td>'+
        '<td>'+textOrDash(ci&&ci.ecarts_detail)+'</td>'+
        '<td>'+textOrDash(ci&&ci.digestion)+'</td>'+
        '<td>'+scoreOrDash(ci&&ci.appetit)+'</td>'+
        '<td>'+yesNoTag(ci&&ci.entraine)+'</td>'+
        '<td>'+textOrDash(ci&&ci.seance_ressenti)+'</td>'+
        '<td>'+textOrDash(ci&&ci.cardio)+'</td>'+
        '<td>'+scoreOrDash(ci&&ci.sommeil)+'</td>'+
        '<td>'+scoreOrDash(ci&&ci.stress)+'</td>'+
        '<td>'+textOrDash(ci&&ci.pas)+'</td>'+
        '<td>'+textOrDash(ci&&ci.eau)+'</td>'+
        '<td>'+yesNoTag(ci&&ci.regles)+'</td>'+
        '<td>'+textOrDash(ci&&ci.spm)+'</td>'+
        '<td>'+textOrDash(ci&&ci.autres)+'</td>'+
      '</tr>';
    }).join('');

    return '<div class="suivi-week">'+
      '<div class="suivi-week-title">'+week.title+'</div>'+(week.subLabel?'<div class="suivi-week-sub">'+week.subLabel+'</div>':'')+
      summaryHtml+
      '<div class="suivi-table-wrap"><table class="suivi-table"><thead><tr>'+
      '<th>Jour</th><th>Poids</th><th>Écarts</th><th>Si oui, quoi ?</th><th>Digestion</th><th>Appétit</th><th>Entraînée</th><th>Charges/répétitions + ressenti</th><th>Cardio</th><th>Sommeil</th><th>Stress</th><th>Pas</th><th>Eau</th><th>Règles</th><th>SPM</th><th>Autres précisions</th>'+
      '</tr></thead><tbody>'+days+'</tbody></table></div></div>';
  }).join('');

  el.innerHTML=weekHtml;
};

function getDieteDB(){
  const db={};
  for(const c in DB_BASE) db[c]=[...DB_BASE[c]];
  // Catégories custom vides (créées par l'utilisateur mais sans aliment encore)
  (S.customCategories||[]).forEach(c=>{ if(!db[c]) db[c]=[]; });
  // Custom aliments
  // Filtrer par client courant (ou aliments sans client_id pour rétrocompat)
  const clientId=S.client?.id;
  S.customAliments.filter(a=>!a.client_id||a.client_id===clientId).forEach(a=>{
    if(!db[a.categorie]) db[a.categorie]=[];
    if(!db[a.categorie].find(x=>x.n===a.nom)) db[a.categorie].push({n:a.nom,k:a.kcal,p:a.proteines,g:a.glucides,l:a.lipides,gpu:a.poids_unite||undefined,custom:true});
  });
  // Recettes — calculer kcal/100g équivalent pour 1 part
  S.recettes.forEach(r=>{
    const cat=r.categorie||'Recettes';
    if(!db[cat]) db[cat]=[];
    if(db[cat].find(x=>x.n===r.nom)) return;
    // Compute totals per part
    let k=0,p=0,g=0,l=0;
    (r.ingredients||[]).forEach(ing=>{
      const res=lookupFoodBase(ing.aliment);
      if(res){k+=ing.quantite/100*res.k;p+=ing.quantite/100*res.p;g+=ing.quantite/100*res.g;l+=ing.quantite/100*res.l;}
    });
    const parts=r.nb_parts||1;
    // Store as "par part" — qty will be in parts (unitaire)
    db[cat].push({n:r.nom,k:Math.round(k/parts),p:Math.round(p/parts*10)/10,g:Math.round(g/parts*10)/10,l:Math.round(l/parts*10)/10,gpu:1,isRecette:true,nb_parts:parts});
  });
  return db;
}

// lookupFoodBase avoids circular reference (used inside getDieteDB)
function lookupFoodBase(name){
  const allSources=[DB_BASE,...[S.customAliments.map(a=>({[a.categorie]:[{n:a.nom,k:a.kcal,p:a.proteines,g:a.glucides,l:a.lipides}]}))]];
  for(const c in DB_BASE){const f=DB_BASE[c].find(x=>x.n.trim()===name.trim());if(f)return f;}
  for(const a of S.customAliments){if(a.nom.trim()===name.trim())return{k:a.kcal,p:a.proteines,g:a.glucides,l:a.lipides};}
  return null;
}

function lookupFood(name){
  const db=getDieteDB();
  for(const c in db){const f=db[c].find(x=>x.n.trim()===name.trim());if(f)return{f,cat:c};}
  return null;
}

function calcFoodItem(item){
  if(!item.food) return{kcal:0,prot:0,gluc:0,lip:0};
  const r=lookupFood(item.food);if(!r||!item.enabled)return{kcal:0,prot:0,gluc:0,lip:0};
  const f=r.f,isUnit=(item.type||'').toUpperCase()==='UNITÉ',grams=isUnit?item.qty*(f.gpu||1):item.qty;
  return{kcal:Math.round(grams/100*f.k),prot:Math.round(grams/100*f.p*10)/10,gluc:Math.round(grams/100*f.g*10)/10,lip:Math.round(grams/100*f.l*10)/10};
}
function mealKcalD(items){return Math.round(items.reduce((s,i)=>s+calcFoodItem(i).kcal,0));}
function getDieteTotals(meals){
  let t={kcal:0,prot:0,gluc:0,lip:0};
  meals.forEach(m=>m.items.forEach(i=>{const c=calcFoodItem(i);t.kcal+=c.kcal;t.prot+=c.prot;t.gluc+=c.gluc;t.lip+=c.lip;}));
  return{kcal:Math.round(t.kcal),prot:Math.round(t.prot*10)/10,gluc:Math.round(t.gluc*10)/10,lip:Math.round(t.lip*10)/10};
}

async function _processMealScan(input,mi){
  const file=input.files[0];if(!file)return;
  input.value='';
  toast('⏳ Analyse en cours…');
  try{
    const {base64,mediaType}=await fileToBase64(file);
    const reply=await callAnthropicVision(base64,mediaType,
      `Analyse cette étiquette nutritionnelle. Extrait les valeurs pour 100g et réponds UNIQUEMENT avec ce JSON :
{"nom":"[nom du produit]","kcal":[nombre],"proteines":[nombre],"glucides":[nombre],"lipides":[nombre],"poids_unite":[poids total en g si c'est un produit entier, sinon null]}`,
      'Tu es un expert en nutrition. Tu lis les étiquettes et retournes uniquement le JSON demandé, sans texte supplémentaire.'
    );
    const match=reply.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('Format inattendu');
    const vals=JSON.parse(match[0]);

    // Afficher modal de confirmation
    const isUnit=vals.poids_unite&&vals.poids_unite>0;
    openModal(`
      <div class="modal-title">📷 Aliment scanné</div>
      <div class="form-group">
        <label class="form-label">Nom</label>

function _confirmMealScan(mi,isUnit,poids_unite){
  const nom=document.getElementById('ms-nom')?.value.trim();
  if(!nom){toast('⚠ Saisis un nom');return;}
  const kcal=parseFloat(document.getElementById('ms-kcal')?.value)||0;
  const prot=parseFloat(document.getElementById('ms-prot')?.value)||0;
  const gluc=parseFloat(document.getElementById('ms-gluc')?.value)||0;
  const lip=parseFloat(document.getElementById('ms-lip')?.value)||0;
  const qty=parseFloat(document.getElementById('ms-qty')?.value)||100;
  const catSel=document.getElementById('ms-cat')?.value;
  const cat=(catSel==='__new__'?document.getElementById('ms-cat-new')?.value.trim():catSel)||'Divers';
  // Sauvegarder la nouvelle catégorie si besoin
  if(catSel==='__new__'&&cat&&cat!=='Divers'){
    if(!S.customCategories) S.customCategories=[];
    if(!S.customCategories.includes(cat)){S.customCategories.push(cat);lsSet('c_customCats',S.customCategories);}
  }

  // Créer l'aliment custom
  const newAliment={
    id:uid(),nom,categorie:cat,kcal,proteines:prot,glucides:gluc,lipides:lip,
    poids_unite:isUnit?poids_unite:null,
    client_id:S.client?.id||null
  };
  if(!S.customAliments) S.customAliments=[];
  if(!S.customAliments.find(a=>a.nom.toLowerCase()===nom.toLowerCase())){
    S.customAliments.push(newAliment);
    lsSet('c_customAliments',S.customAliments);
    saveCustomAlimentToSupa(newAliment);
  }

  // Ajouter au repas
  const meals=getClientDiete(S.client.id,S.dieteState.day).meals;
  meals[mi].items.push({
    food:nom,cat,
    type:isUnit?'Unité':null,
    qty,enabled:true
  });
  persist();
  closeModal();
  render.diete();
  toast(`✓ "${nom}" ajouté au repas !`);
}

async function callAnthropicVision(base64, mediaType, userText, systemPrompt){
  const key=S.iaApiKey;
  if(!key) throw new Error('NO_KEY');

    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:600,
      system:systemPrompt||'Tu es un assistant nutrition. Tu réponds en français, de manière concise.',
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
        {type:'text',text:userText}
      ]}]
    })
  });
  if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error?.message||'Erreur API ('+res.status+')');}
  const data=await res.json();
  return data.content[0].text;

function cleanIaText(txt){
  // Remove markdown bold/italic, standalone asterisks, leading dashes as bullets
  return txt
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/\*(.*?)\*/g,'$1')
    .replace(/^\s*[\*\-]\s+/gm,'')
    .replace(/\*/g,'')
    .replace(/#+\s*/g,'')
    .trim();
}

function fileToBase64(file){
  return new Promise(resolve=>{
    const r=new FileReader();
    r.onload=e=>resolve({base64:e.target.result.split(',')[1],mediaType:file.type||'image/jpeg'});
    r.readAsDataURL(file);
  });
}

    // Compter les nouveaux aliments à créer
    const newFoods=data.new_foods||[];
    const newFoodNames=newFoods.map(f=>f.nom);
    const suffix=newFoods.length>0?`\n\n${newFoods.length} nouvel(s) aliment(s) sera(ont) créé(s) : ${newFoodNames.join(', ')}.`:'';

    const db=getDieteDB();
    const allFoods={};
    Object.entries(db).forEach(([cat,items])=>items.forEach(f=>{allFoods[f.n]={cat,food:f};}));

    const newMeals=data.meals.map(m=>({
      name:m.name||'Repas',
      items:(m.items||[]).map(it=>{
        const found=allFoods[it.food];
        return {food:it.food,cat:found?found.cat:(it.cat||''),type:it.type||null,qty:it.qty||100,enabled:true};
      })
    }));

    confirmDialog(
      '✅ Appliquer ce plan ?',
      `Ce plan contient ${newMeals.length} repas. Le plan actuel sera remplacé.`+suffix,
      'Appliquer',
      ()=>{
        // Créer les nouveaux aliments s'ils n'existent pas déjà
        newFoods.forEach(f=>{
          const exists=S.customAliments.find(a=>a.nom.trim().toLowerCase()===f.nom.trim().toLowerCase());
          if(!exists){
            const entry={
              id:uid(),
              nom:f.nom,
              categorie:f.cat||'Divers',
              kcal:f.kcal||0,
              proteines:f.proteines||0,
              glucides:f.glucides||0,
              lipides:f.lipides||0,
              poids_unite:f.poids_unite||undefined,
              client_id:S.client.id
            };
            S.customAliments.push(entry);
            saveCustomAlimentToSupa(entry);
          }
        });
        lsSet('c_customAliments',S.customAliments);

        const diete=getClientDiete(S.client.id,S.dieteState.day);
        diete.meals=newMeals;
        diete.iaModified=true;
        diete.iaModifiedDate=new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'});
        persist();
        saveDieteToSupa(S.client.id,S.dieteState.day);
        toast('✓ Plan mis à jour et sauvegardé !');
        if(S.screen==='diete') render.diete();
      }
    );
  } catch(e){
    toast('⚠ Erreur lors de l\'application : '+e.message);
  }
}

async function searchOpenFoodFacts(query){
  try{
    // Nettoyer la requête : garder seulement les mots-clés (enlever les mots communs français)
    const stopWords=['mets','met','ajoute','ajouter','dans','ma','mon','moi','le','la','les','un','une','des','du','de','je','veux','voudrais','peut','peux','donne','donner','avec','sans','pour','par','sur','quelle','quelles','quels','quel','est','sont','valeurs','nutritionnelles','diète','repas','aliment','menu','programme','combien','kcal','calorie','calories','macro','macros'];
    const cleaned=query.toLowerCase().split(/\s+/).filter(w=>w.length>2&&!stopWords.includes(w)).slice(0,4).join(' ')||query;
    console.log('[OFFF] Recherche :', cleaned);
    const url=`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(cleaned)}&json=1&page_size=8&fields=product_name,nutriments&action=process&search_simple=1`;
    const res=await fetch(url);
    const data=await res.json();
    const results=(data.products||[])
      .filter(p=>p.product_name&&p.nutriments)
      .map(p=>({
        nom:p.product_name,
        kcal:Math.round(p.nutriments['energy-kcal_100g']||p.nutriments['energy-kcal']||0),
        proteines:Math.round((p.nutriments.proteins_100g||0)*10)/10,
        glucides:Math.round((p.nutriments.carbohydrates_100g||0)*10)/10,
        lipides:Math.round((p.nutriments.fat_100g||0)*10)/10
      }))
      .filter(p=>p.kcal>0)
      .slice(0,5);
    console.log('[OFFF] Résultats :', results.length, results.map(r=>r.nom));
    return results;
  }catch(e){ console.error('[OFFF] Erreur fetch:', e); return []; }
}

async function sendIaMessage(){
  if(S.iaLoading) return;
  const txt=document.getElementById('ia-txt');
  const msg=(txt?.value||'').trim();
  const photos=S._iaPendingPhotos||[];
  if(!msg&&!photos.length) return;

  txt.value='';
  txt.style.height='auto';
  S._iaPendingPhotos=[];

  // Construire le contenu utilisateur (texte + images si applicable)
  let userContent;
  if(photos.length>0){
    userContent=[];
    photos.forEach(p=>userContent.push({type:'image',source:{type:'base64',media_type:p.mediaType,data:p.base64}}));
    userContent.push({type:'text',text:msg||'Analyse ces photos dans le contexte de la nutrition de ce client.'});
  } else {
    userContent=msg;
  }

  // Affichage dans le chat (texte simplifié)
  const displayMsg=msg||(photos.length===1?'📷 Photo envoyée':'📷 '+photos.length+' photos envoyées');
  S.iaChat.push({role:'user',content:displayMsg,_rawContent:userContent});
  S.iaLoading=true;
  render.ia();

  try{
    // Recherche Open Food Facts en parallèle (uniquement si message texte)
    let offContext='';
    if(msg){
      const offResults=await searchOpenFoodFacts(msg);
      if(offResults.length>0){
        offContext='\n\n=== DONNÉES OPEN FOOD FACTS DISPONIBLES (source réelle, valeurs pour 100g) ===\nTu AS accès à ces données réelles. Utilise-les OBLIGATOIREMENT, ne dis pas que tu n\'as pas internet :\n'+
          offResults.map(f=>`• ${f.nom} : ${f.kcal}kcal | P${f.proteines}g | G${f.glucides}g | L${f.lipides}g`).join('\n')+
          '\nPour un produit entier, multiplie par le poids réel du produit / 100. Choisis le résultat le plus pertinent pour la question posée.\n=== FIN DONNÉES OPEN FOOD FACTS ===';
      }
    }

    // Construire les messages API en utilisant _rawContent si disponible
    const apiMessages=S.iaChat.filter(m=>m.role==='user'||m.role==='assistant').map(m=>({
      role:m.role,
      content:m._rawContent||m.content
    }));
    const reply=await callAnthropicAPI(apiMessages, buildIASystemPrompt()+offContext);
    S.iaChat.push({role:'assistant',content:cleanIaText(reply)});
  } catch(err){
    if(err.message==='NO_KEY'){
      S.iaChat.push({role:'assistant',content:'⚠️ Clé API non configurée. Contacte ton coach.'});
    } else {
      S.iaChat.push({role:'assistant',content:'⚠️ Erreur : '+err.message});
    }
  }
  S.iaLoading=false;
  render.ia();
}

async function saveIaKey(){
  const k=(document.getElementById('ia-key-input')?.value||'').trim();
  if(!k){toast('Entre une clé API valide');return;}
  // UPSERT dans Supabase app_config
  const url=`${SUPA_URL}/rest/v1/app_config`;
  await fetch(url,{
    method:'POST',
    headers:{...getHeaders(),'Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({key:'ia_anthropic_key',value:k,updated_at:new Date().toISOString()})
  });
  S.iaApiKey=k;
  S.iaChat=[];
  toast('✅ Clé API enregistrée — active sur tous les appareils');
  render.ia();
}

async function resetIaKey(){
  if(!confirm('Supprimer la clé API ? L\'IA sera désactivée sur tous les appareils.'))return;
  await supa('DELETE','app_config','','?key=eq.ia_anthropic_key');
  S.iaApiKey='';

}

    <div class="form-group"><label class="form-label">Ingrédients</label>
      <div id="rc-ings">${renderRecetteIngs(r.ingredients)}</div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        <select class="form-inp form-inp-sm form-select" id="rc-cat" onchange="updateRcAliments()" style="flex:1;min-width:120px">
          ${Object.keys(db).map(c=>`<option>${c}</option>`).join('')}
        </select>
        <select class="form-inp form-inp-sm form-select" id="rc-ali" style="flex:1;min-width:120px">${renderRcOptions(Object.keys(db)[0])}</select>
        <input class="form-inp form-inp-sm" id="rc-qty" type="number" min="0" placeholder="g" style="width:60px" />
        <button class="btn btn-secondary btn-sm" style="width:auto" onclick="addRcIng()">+</button>
      </div>
    </div>
    <div id="rc-total" style="font-size:13px;color:var(--text2);margin-bottom:12px;padding:8px;background:var(--bg2);border-radius:var(--radius)"></div>
    <button class="btn btn-primary" onclick="${r.id?`saveRecette('${r.id}')`:'createRecette()'}">Enregistrer</button>
  `);

}
function renderRecetteIngs(ings){
  if(!ings.length) return '<div style="font-size:12px;color:var(--text3);margin-bottom:4px">Aucun ingrédient</div>';
  return ings.map((ing,i)=>`<div class="recette-ing-row">
    <div style="flex:1;font-size:13px">${ing.aliment}</div>
    <div style="font-size:12px;color:var(--text3);min-width:50px;text-align:right">${ing.quantite}g</div>
    <button onclick="removeRcIng(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:14px;padding:0 4px">✕</button>
  </div>`).join('');
}
function renderRcOptions(cat){const db=getDieteDB();return(db[cat]||[]).map(f=>`<option>${f.n}</option>`).join('');}
function updateRcAliments(){const cat=document.getElementById('rc-cat').value;const el=document.getElementById('rc-ali');if(el)el.innerHTML=renderRcOptions(cat);}
function addRcIng(){
  const ali=document.getElementById('rc-ali').value;
  const qty=parseFloat(document.getElementById('rc-qty').value);
  if(!ali||isNaN(qty)||qty<=0){toast('⚠ Saisis aliment et quantité');return;}
  S.recetteEnCours.ingredients.push({aliment:ali,quantite:qty});
  document.getElementById('rc-qty').value='';
  document.getElementById('rc-ings').innerHTML=renderRecetteIngs(S.recetteEnCours.ingredients);
  updateRecetteTotal();
}
function removeRcIng(i){
  S.recetteEnCours.ingredients.splice(i,1);
  document.getElementById('rc-ings').innerHTML=renderRecetteIngs(S.recetteEnCours.ingredients);
  updateRecetteTotal();
}
function updateRecetteTotal(){
  const el=document.getElementById('rc-total');if(!el)return;
  let k=0,p=0,g=0,l=0;
  S.recetteEnCours.ingredients.forEach(ing=>{const res=lookupFood(ing.aliment);if(res){k+=ing.quantite/100*res.f.k;p+=ing.quantite/100*res.f.p;g+=ing.quantite/100*res.f.g;l+=ing.quantite/100*res.f.l;}});
  const parts=S.recetteEnCours.nb_parts||1;
  el.textContent=`Total : ${Math.round(k)} kcal — P:${Math.round(p)}g G:${Math.round(g)}g L:${Math.round(l)}g | Par part : ${Math.round(k/parts)} kcal`;
}
function createRecette(){
  const nom=document.getElementById('rc-nom').value.trim();
  if(!nom){toast('⚠ Saisis un nom');return;}
  if(!S.recetteEnCours.ingredients.length){toast('⚠ Ajoute au moins un ingrédient');return;}
  const rcCat=document.getElementById('rc-cat').value.trim()||'Recettes';
  const newR={id:'r'+uid(),nom,categorie:rcCat,nb_parts:S.recetteEnCours.nb_parts||1,ingredients:S.recetteEnCours.ingredients};
  S.recettes.push(newR);
  S.recettes.sort((a,b)=>a.nom.localeCompare(b.nom));
  lsSet('c_recettes',S.recettes);
  saveRecetteToSupa(newR);
  closeModal();render.recettes();toast('✓ Recette créée');
}
function showRecetteDetail(id){
  const r=S.recettes.find(x=>x.id===id);if(!r)return;
  let k=0,p=0,g=0,l=0;
  (r.ingredients||[]).forEach(ing=>{const res=lookupFood(ing.aliment);if(res){k+=ing.quantite/100*res.f.k;p+=ing.quantite/100*res.f.p;g+=ing.quantite/100*res.f.g;l+=ing.quantite/100*res.f.l;}});
  const parts=r.nb_parts||1;
  openModal(`
    <div class="modal-title">${r.nom}</div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <div class="mc" style="flex:1"><div class="lbl">Total</div><div class="val">${Math.round(k)}</div><div class="tgt">kcal</div></div>
      <div class="mc" style="flex:1"><div class="lbl">/ part</div><div class="val">${Math.round(k/parts)}</div><div class="tgt">kcal</div></div>
      <div class="mc" style="flex:1"><div class="lbl">Prot/part</div><div class="val">${Math.round(p/parts)}</div><div class="tgt">g</div></div>
    </div>
    <div class="form-label" style="margin-bottom:8px">Ingrédients (${r.nb_parts} part${r.nb_parts>1?'s':''})</div>
    ${(r.ingredients||[]).map(ing=>{const res=lookupFood(ing.aliment);return `<div class="recette-ing-row"><div style="flex:1;font-size:13px">${ing.aliment}</div><div style="font-size:12px;color:var(--text3)">${ing.quantite}g · ${res?Math.round(ing.quantite/100*res.f.k)+' kcal':'?'}</div></div>`;}).join('')}
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-secondary" style="flex:1" onclick="editRecette('${r.id}')">✏️ Modifier</button>
      <button class="btn btn-danger btn-sm" style="flex:1" onclick="deleteRecette('${r.id}')">Supprimer</button>
    </div>
  `);
}
function editRecette(id){
  const r=S.recettes.find(x=>x.id===id);if(!r)return;
  S.recetteEnCours={...r,ingredients:[...r.ingredients]};renderRecetteModal();
}
function saveRecette(id){
  const nom=document.getElementById('rc-nom').value.trim();if(!nom){toast('⚠ Nom obligatoire');return;}
  const idx=S.recettes.findIndex(r=>r.id===id);
  const rcCat2=document.getElementById('rc-cat').value.trim()||'Recettes';
  if(idx>=0) S.recettes[idx]={id,nom,categorie:rcCat2,nb_parts:S.recetteEnCours.nb_parts,ingredients:S.recetteEnCours.ingredients};
  lsSet('c_recettes',S.recettes);closeModal();render.recettes();toast('✓ Recette modifiée');
}
function deleteRecette(id){
  confirmDialog('Supprimer cette recette ?','','Supprimer',()=>{
  _deleteRecette(id);
  });
}
function _deleteRecette(id){
  S.recettes=S.recettes.filter(r=>r.id!==id);
  lsSet('c_recettes',S.recettes);
  supa('DELETE','recettes','',`?id=eq.${id}`);
  closeModal();render.recettes();toast('Recette supprimée');
}

let _confirmCallback=null;

function confirmDialog(msg, sub, okLabel, cb){
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('confirm-sub').textContent=sub||'';
  const okBtn=document.getElementById('confirm-ok-btn');
  okBtn.textContent=okLabel||'Supprimer';
  // Style ok button based on action
  okBtn.className='btn btn-danger';
  _confirmCallback=cb;
  document.getElementById('confirm-overlay').classList.add('open');
}
function confirmOk(){
  document.getElementById('confirm-overlay').classList.remove('open');
  if(_confirmCallback) _confirmCallback();
  _confirmCallback=null;
}
function confirmCancel(){
  document.getElementById('confirm-overlay').classList.remove('open');
  _confirmCallback=null;
}

async function syncClients(){
  const [actifs,archives]=await Promise.all([
    supa('GET','clients','','?order=nom.asc&archive=eq.false'),
    supa('GET','clients','','?order=nom.asc&archive=eq.true')
  ]);
  if(actifs){S.clients=actifs;lsSet('c_clients',actifs);}
  if(archives){S.archivedClients=archives;lsSet('c_archivedClients',archives);}
}

async function syncExercices(){
  const res=await supa('GET','exercices','','?order=cat.asc,nom.asc');
  const defaults=defaultExos();
  // Exercices custom locaux (créés sur cet appareil, id commence par 'c')
  const localCustom=S.exercices.filter(e=>e.id.startsWith('c'));
  if(res&&res.length){
    const remoteCustom=res.filter(e=>e.is_custom);
    const remoteIds=new Set(remoteCustom.map(e=>e.id));
    // Garder les exercices custom locaux pas encore arrivés sur Supabase
    const pendingLocal=localCustom.filter(e=>!remoteIds.has(e.id));
    // Retenter la sauvegarde des exercices en attente
    pendingLocal.forEach(e=>saveExoCustomToSupa(e));
    const merged=[...defaults,...remoteCustom.map(e=>({id:e.id,nom:e.nom,cat:e.cat,desc:e.desc_exercice||'',video:e.video||''})),...pendingLocal];
    S.exercices=merged;lsSet('c_exercices',merged);
  }
  // Si Supabase ne répond pas, on garde les données locales telles quelles
}

async function syncCustomAliments(){
  const res=await supa('GET','aliments_custom','','?order=categorie.asc,nom.asc');
  if(res){
    const supaIds=new Set(res.map(a=>a.id));
    const pending=S.customAliments.filter(a=>!supaIds.has(a.id));
    pending.forEach(a=>saveCustomAlimentToSupa(a));
    S.customAliments=[...res,...pending];
    lsSet('c_customAliments',S.customAliments);
  }
}

async function syncRecettes(){
  const res=await supa('GET','recettes','','?order=nom.asc');
  if(res){S.recettes=res;lsSet('c_recettes',res);}
}

async function syncClientData(clientId){
  const [dietes,progs,seances,logs,checkins,bilans]=await Promise.all([
    supa('GET','dietes','',`?client_id=eq.${clientId}`),
    supa('GET','programmes','',`?client_id=eq.${clientId}&order=created_at.asc`),
    supa('GET','seances_type','',`?order=ordre.asc`),
    supa('GET','logs_seances','',`?client_id=eq.${clientId}&order=date_seance.desc`),
    supa('GET','checkins','',`?client_id=eq.${clientId}&order=date.desc`),
    supa('GET','bilans_hebdo','',`?client_id=eq.${clientId}&order=semaine_debut.desc`),
  ]);
  if(dietes){
    const dON=dietes.find(d=>d.jour==='on');
    const dOFF=dietes.find(d=>d.jour==='off');
    if(!S.dietes[clientId]) S.dietes[clientId]={};
    if(dON){S.dietes[clientId].on={...S.dietes[clientId].on,targets:{kcal:dON.cible_kcal,prot:dON.cible_prot,gluc:dON.cible_gluc,lip:dON.cible_lip},meals:dON.repas,_id:dON.id};}
    if(dOFF){S.dietes[clientId].off={...S.dietes[clientId].off,targets:{kcal:dOFF.cible_kcal,prot:dOFF.cible_prot,gluc:dOFF.cible_gluc,lip:dOFF.cible_lip},meals:dOFF.repas,_id:dOFF.id};}
  }
  if(progs){
    const supaProgIds=new Set(progs.map(p=>p.id));
    // Conserver les programmes locaux pas encore synchronisés
    const pendingProgs=S.programmes.filter(p=>p.client_id===clientId&&!supaProgIds.has(p.id));
    pendingProgs.forEach(p=>supa('POST','programmes',{id:p.id,client_id:p.client_id,nom:p.nom,nb_seances:p.nb_seances}));
    S.programmes=S.programmes.filter(p=>p.client_id!==clientId);
    S.programmes.push(...progs,...pendingProgs);
  }
  if(seances){
    const progIds=new Set((progs||[]).map(p=>p.id));
    const allProgIds=new Set([...progIds,...S.programmes.filter(p=>p.client_id===clientId).map(p=>p.id)]);
    const supaSeanceIds=new Set(seances.map(s=>s.id));
    // Conserver les séances locales pas encore synchronisées
    const pendingSeances=S.seancesType.filter(s=>allProgIds.has(s.programme_id)&&!supaSeanceIds.has(s.id));
    pendingSeances.forEach(s=>supa('POST','seances_type',{id:s.id,programme_id:s.programme_id,nom:s.nom,ordre:s.ordre,exercices:s.exercices}));
    const clientSeances=seances.filter(s=>progIds.has(s.programme_id));
    S.seancesType=S.seancesType.filter(s=>!allProgIds.has(s.programme_id));
    S.seancesType.push(...clientSeances,...pendingSeances);
  }
  if(logs){
    const supaLogIds=new Set(logs.map(l=>l.id));
    // Conserver les logs locaux pas encore synchronisés et retenter l'envoi
    const pendingLogs=S.logsSeances.filter(l=>l.client_id===clientId&&!supaLogIds.has(l.id));
    pendingLogs.forEach(l=>saveLogToSupa(l));
    S.logsSeances=S.logsSeances.filter(l=>l.client_id!==clientId);
    // Remapper exercices_log → exercices (Supabase stocke sous exercices_log)
    S.logsSeances.push(...logs.map(l=>({...l,date:l.date_seance||l.date,exercices:l.exercices||l.exercices_log||[]})),...pendingLogs);
  }
  if(checkins){
    const supaCheckinDates=new Set(checkins.map(ci=>ci.date));
    // Conserver les check-ins locaux pas encore synchronisés (ex : check-in de la veille)
    const pendingCheckins=S.checkIns.filter(c=>c.client_id===clientId&&!supaCheckinDates.has(c.date));
    pendingCheckins.forEach(ci=>saveCheckinToSupa(ci));
    S.checkIns=S.checkIns.filter(c=>c.client_id!==clientId);
    S.checkIns.push(...checkins.map(ci=>({...ci,date:ci.date})),...pendingCheckins);
  }
  if(bilans){
    S.bilansHebdo=S.bilansHebdo.filter(b=>b.client_id!==clientId);
    S.bilansHebdo.push(...bilans.map(b=>({
      id:b.id,client_id:b.client_id,date:b.semaine_debut,
      photos:b.photos||{face:null,gauche:null,droit:null,dos:null},
      mensurations:{poitrine:b.poitrine||'',taille:b.taille||'',fessiers:b.fessiers||'',cuisses:b.cuisses||'',bras:b.bras||''},
      notes:b.notes||'',
      completed:b.completed||false
    })));
  }
  persist();
}

async function saveClientToSupa(client){
  if(!client.id) return;
  const payload={
    prenom:client.prenom,
    nom:client.nom,
    email:(client.email||'').trim().toLowerCase()||null,
    user_id:client.user_id||null,
    objectif:client.objectif||null,
    favori:client.favori||false,
    archive:client.archive||false,
    goals:client.goals||null,
    notes_coach:client.notes_coach||null
  };
  const existing=await supa('GET','clients','',`?id=eq.${client.id}`);
  if(existing&&existing.length){
    await supa('PATCH','clients',payload,`?id=eq.${client.id}`);
  } else {
    await supa('POST','clients',{id:client.id,...payload});
  }
}

async function saveDieteToSupa(clientId,day){

  }

async function saveBilanHebdoToSupa(bilan){

    semaine_debut:bilan.date,
    photos:bilan.photos||{face:null,gauche:null,droit:null,dos:null},
    poitrine:parseFloat(bilan.mensurations?.poitrine)||null,

    fessiers:parseFloat(bilan.mensurations?.fessiers)||null,
